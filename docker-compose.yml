# Source: docs/poc-spec.md §"Docker Compose"
services:
  postgres:
    image: postgres:16-alpine
    container_name: house-track-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: house_track
      POSTGRES_USER: house_track
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      TZ: Europe/Chisinau
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U house_track -d house_track']
      interval: 5s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:latest
    container_name: house-track-grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: 'true'
      GF_SECURITY_COOKIE_SAMESITE: disabled
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      TZ: Europe/Chisinau
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - '127.0.0.1:3001:3000'

  property-crawler:
    build: .
    container_name: property-crawler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - TZ=Europe/Chisinau
      - DATABASE_URL=postgresql://house_track:${POSTGRES_PASSWORD}@postgres:5432/house_track
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

volumes:
  pg-data:
  grafana-data:
